name: Nightly Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

env:
  GCS_REFS_OBJECT: gs://cucorelib-game-files/cu-build-refs.zip
  NIGHTLY_ZIP_NAME: CUCoreLib-nightly-prerelease.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: microsoft/setup-msbuild@v2

      - uses: NuGet/setup-nuget@v2

      - name: Download private game refs
        id: refs
        shell: powershell
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP 'cu-game-refs.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'cu-game-refs'

          if (Test-Path $extractRoot)
          {
              Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }

          gcloud storage cp $env:GCS_REFS_OBJECT $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot

          $assembly = Get-ChildItem -Path $extractRoot -Recurse -Filter 'Assembly-CSharp.dll' |
              Where-Object { $_.FullName -like '*CasualtiesUnknown_Data\Managed\Assembly-CSharp.dll' } |
              Select-Object -First 1

          if (-not $assembly)
          {
              throw "Could not find CasualtiesUnknown_Data\\Managed\\Assembly-CSharp.dll in extracted refs."
          }

          $managedDir = Split-Path -Parent $assembly.FullName
          $dataDir = Split-Path -Parent $managedDir
          $baseGamePath = Split-Path -Parent $dataDir

          "CUCORELIB_BASE_GAME_PATH=$baseGamePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved CUCORELIB_BASE_GAME_PATH to $baseGamePath"

      - name: Restore
        shell: powershell
        run: |
          nuget restore 'CUCoreLib.sln' -PackagesDirectory packages -NonInteractive -Verbosity detailed

      - name: Build
        shell: powershell
        run: |
          msbuild 'CUCoreLib.csproj' /t:Compile /p:Configuration=Release /p:Platform=AnyCPU /p:BepInExDir=

      - name: Package nightly zip
        shell: powershell
        run: |
          $stageDir = Join-Path $env:RUNNER_TEMP 'CUCoreLib-nightly'
          $zipPath = Join-Path $env:RUNNER_TEMP $env:NIGHTLY_ZIP_NAME

          if (Test-Path $stageDir)
          {
              Remove-Item -LiteralPath $stageDir -Recurse -Force
          }

          if (Test-Path $zipPath)
          {
              Remove-Item -LiteralPath $zipPath -Force
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item 'obj\Release\CUCoreLib.dll' -Destination $stageDir
          Copy-Item 'obj\Release\CUCoreLib.pdb' -Destination $stageDir
          Copy-Item 'bin\Release\CUCoreLib.xml' -Destination $stageDir
          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $zipPath

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CUCoreLib-nightly
          path: |
            obj\Release\CUCoreLib.dll
            obj\Release\CUCoreLib.pdb
            bin\Release\CUCoreLib.xml
            ${{ runner.temp }}\${{ env.NIGHTLY_ZIP_NAME }}
          if-no-files-found: error

      - name: Publish nightly prerelease
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Automated nightly build from `main`! 
            This is the latest cutting-edge build of CUCoreLib, and may be unstable. That is, every single commit to `main` will update this. 

            For the changelogs, please refer to [CHANGELOG.md](https://github.com/jimmyking9999999/CUCoreLib/blob/main/CHANGELOG.md).

            For most users, it is recommended to use the latest stable release below.
            Thanks for testing and reporting issues!
            
          files: |
            ${{ runner.temp }}\${{ env.NIGHTLY_ZIP_NAME }}
