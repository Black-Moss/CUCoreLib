# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: CUCoreLibWebapp/package-lock.json
      - run: npm ci
        working-directory: CUCoreLibWebapp
      - run: npm run build
        working-directory: CUCoreLibWebapp
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CUCORELIB }}
      - run: npx firebase-tools@latest deploy --only hosting --project cucorelib --non-interactive
        working-directory: CUCoreLibWebapp
