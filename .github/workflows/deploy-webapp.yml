name: Deploy CUCoreLib Webapp

on:
  push:
    branches:
      - main
    paths:
      - "CUCoreLibWebapp/**"
      - ".github/workflows/deploy-webapp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CUCoreLibWebapp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CUCoreLibWebapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci

      - name: Build webapp
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CUCORELIB }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          entryPoint: CUCoreLibWebapp
          channelId: live
